[phases.setup]
nixPkgs = ["python312"]

[phases.install]
cmds = [
    "python3.12 -m venv /opt/venv",
    "source /opt/venv/bin/activate",
    "pip install --upgrade pip",
    "pip install --no-cache-dir -r backend/requirements.txt --only-binary pandas,numpy,scipy"
]

[start]
cmd = "cd backend && /opt/venv/bin/uvicorn app.main:app --host 0.0.0.0 --port "
